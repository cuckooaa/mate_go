<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mate - 用积分管理你的效率！</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/static/a4.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/static/a4.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/static/a4.png">
  <link rel="shortcut icon" href="/static/a4.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html {
    background-color: #f3f4f6; /* 使用与背景图相近的颜色 */
    }
    body {
      font-family: 'Inter', sans-serif;
      background-color: rgba(255, 255, 255, 0);
      margin: 0;
      position: relative;
      min-height: 100vh;
      overflow-x: hidden;
    }
    /* 背景层：用伪元素实现固定效果 */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      /* background-image: url('/static/a0.png'); */
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      z-index: -100; /* 在内容层后面 */
    }


    #task-list li, #shop-items-list li, #redeemed-items-list li {
      transition: all 0.2s;
    }
  </style>
</head>

<body class="flex flex-col items-center justify-center min-h-screen p-4">
    <div id="weekrecord-page" class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-none pb-20 md:pb-8 min-h-screen">
        <a href="/" id="rules-back-btn" class="text-gray-600 hover:text-blue-600 transition-colors">← 返回计划页面</a>
        <header id="main-header" class="flex flex-col mt-8">
            <h1 id="season-week" class="text-4xl font-bold text-gray-800">Mate</h1>
        </header>
        <div class="mt-4">
        <div id="task-list" class="space-y-4"></div>
        </div>
    </div>

    <script>
        const taskList = document.getElementById('task-list');
        const weekrecordId = "{{ .week_record }}";
        const seasonweek = document.getElementById('season-week');

        function formatTime(totalSeconds) {
        const hours = Math.floor(totalSeconds / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;

        return [hours, minutes, seconds]
            .map(v => v < 10 ? "0" + v : v)
            .join(":");
        }

        async function fetchTasks() {
        const response = await fetch(`/api/weekrecord/${weekrecordId}`);
        const data = await response.json();
        const tasks = data.tasks;
        const name= data.name;
        seasonweek.textContent=name;
        tasks.forEach(task => {

            const e = document.createElement('div');
            e.className = `bg-opacity-50 relative bg-gray-50 p-4 rounded-lg shadow-sm border border-gray-200 flex flex flex-col  justify-between`;
            e.innerHTML = `
            <div class="justify-start ">
              <p class="text-sm text-gray-500 mb-1">特性: ${task.type} (${task.points}分) </p>
              <p class="text-sm text-gray-500 mb-1">时间: ${task.created_at}</p>
              <p class="text-gray-700 font-medium">${task.description}</p>
            </div>
              <div class="absolute top-2 right-4 mt-1 font-mono  text-2xl rounded-full py-2 px-4 transition-colors text-gray-500 ">
                        ${formatTime(task.time_spent_seconds)}
              </div>
            
            `;
            taskList.appendChild(e);
            });
        }

        // 页面加载时的初始化
        window.onload = () => {
            // 页面初始加载时，显示加载状态，然后显示登录模态框
            fetchTasks();
        };
    </script>
</body>
</html>
