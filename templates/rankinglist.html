            <ol id="leaderboard-list" class="list-decimal pl-5 space-y-3 mt-2">
                <p id="loading-message" class="text-center text-gray-500">正在加载排行榜...</p>

    <script>
        async function fetchAndRenderLeaderboard() {
                const listElement = document.getElementById('leaderboard-list');
                
                listElement.innerHTML = '<p class="text-center text-gray-500" id="loading-message">正在加载排行榜...</p>';

                try {
                    const response = await fetch('/api/leaderboard');
                    const data = await response.json(); // 期望为数组

                    if (!response.ok) {
                        throw new Error(data.error || '无法加载排行榜数据');
                    }

                    listElement.innerHTML = ''; // 清除加载信息
                    
                    const rows = Array.isArray(data) ? data : [];
                    if (rows.length === 0) {
                        listElement.innerHTML = '<p class="text-center text-gray-500">快来获取首枚积分吧！</p>';
                        return;
                    }

                    // 渲染列表项
                    // data 已经是按 total_points 降序排列的列表
                    rows.forEach((userEntry, index) => { // userEntry: {nickname, avatar, total_points}
                        const listItem = document.createElement('li');
                        listItem.className = 'flex items-center p-3 rounded-lg border-b border-gray-100'; // 移除 justify-between，改为更灵活的布局

                        let rankClass = 'text-gray-700 font-medium';
                        if (index === 0) {
                            rankClass = 'text-yellow-600 font-extrabold text-lg'; // 第一名
                        } else if (index === 1) {
                            rankClass = 'text-gray-500 font-bold'; // 第二名
                        } else if (index === 2) {
                            rankClass = 'text-amber-700 font-semibold'; // 第三名
                        }

                        const rawPoints = typeof userEntry.total_points === 'number' ? userEntry.total_points : 0;
                        const formattedPoints = rawPoints.toFixed(1);

                        // 确定头像 URL，如果为空则使用默认头像
                        const avatarUrl = userEntry.avatar ? userEntry.avatar : '/static/a2.png';

                        listItem.innerHTML = `
                            <span class="mr-4 ${rankClass}">
                                #${index + 1}.
                            </span>
                            <img src="${avatarUrl}" alt="${userEntry.nickname}的头像" 
                                class="w-10 h-10 rounded-full object-cover mr-4 border border-gray-200">
                            <span class="flex-grow text-gray-700 font-medium">${userEntry.nickname}</span>
                            <span class="text-blue-600 font-extrabold text-lg">
                                ${formattedPoints} 分
                            </span>
                        `;
                        
                        listElement.appendChild(listItem);
                    });

                } catch (error) {
                    console.error("加载排行榜失败:", error);
                    // 尽量降级为友好的空态（而不是红字报错挡住用户）
                    listElement.innerHTML = '<p class="text-center text-gray-500">快来获取首枚积分吧！</p>';
                }
        }
